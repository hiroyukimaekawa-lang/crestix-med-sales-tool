<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイナビ重複判定ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e0dfd8;
  --border2: #c8c7bf;
  --text: #1a1918;
  --text2: #6b6a65;
  --text3: #9b9a94;
  --accent: #1a5276;
  --accent-bg: #eaf0f6;
  --success: #1a6b3c;
  --success-bg: #eaf6ef;
  --success-border: #b7dfc8;
  --warn: #7a4e00;
  --warn-bg: #fdf4e3;
  --warn-border: #f0d080;
  --radius: 8px;
  --radius-lg: 12px;
}

body {
  font-family: 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

.page {
  max-width: 760px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 4rem;
}

header {
  margin-bottom: 2.5rem;
}

.app-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}

h1 {
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 14px;
  color: var(--text2);
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 1rem;
}

.upload-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

@media (max-width: 540px) {
  .upload-grid { grid-template-columns: 1fr; }
}

.upload-item {
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  background: var(--surface2);
  transition: border-color 0.15s, background 0.15s;
  cursor: pointer;
  position: relative;
}

.upload-item:hover { border-color: var(--accent); }

.upload-item.loaded {
  border-style: solid;
  border-color: var(--success);
  background: var(--success-bg);
}

.upload-item label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
}

.upload-item input[type=file] { display: none; }

.upload-icon {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
}

.upload-item.loaded .upload-icon {
  background: var(--success-border);
}

.upload-meta { flex: 1; min-width: 0; }

.upload-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.upload-required {
  font-size: 10px;
  color: var(--accent);
  font-weight: 500;
  margin-left: 4px;
}

.upload-status {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.upload-item.loaded .upload-status { color: var(--success); }

.run-btn {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  font-weight: 500;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: opacity 0.15s;
  margin-top: 0.5rem;
  letter-spacing: 0.01em;
}

.run-btn:hover:not(:disabled) { opacity: 0.88; }
.run-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.result-section { display: none; }
.result-section.visible { display: block; margin-top: 1.5rem; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 1rem;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}

.stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.stat-value { font-size: 26px; font-weight: 500; color: var(--text); }
.stat.success .stat-value { color: var(--success); }
.stat.warn .stat-value { color: var(--warn); }

.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

@media (max-width: 540px) {
  .result-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr; }
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
}

.result-card.success { border-color: var(--success-border); background: var(--success-bg); }
.result-card.warn { border-color: var(--warn-border); background: var(--warn-bg); }

.result-card-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 4px;
}

.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 99px;
}

.badge.success { background: var(--success-border); color: var(--success); }
.badge.warn { background: var(--warn-border); color: var(--warn); }

.result-card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}

.result-card-desc {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.55;
  margin-bottom: 12px;
}

.dl-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid;
  transition: opacity 0.15s;
}

.dl-btn.success {
  background: var(--success);
  color: #fff;
  border-color: var(--success);
}

.dl-btn.warn {
  background: var(--warn);
  color: #fff;
  border-color: var(--warn);
}

.dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.dl-btn:hover:not(:disabled) { opacity: 0.85; }

.preview-wrap {
  margin-top: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}

.preview-wrap table {
  width: 100%;
  font-size: 11px;
  border-collapse: collapse;
  table-layout: fixed;
}

.preview-wrap th {
  background: var(--surface2);
  padding: 6px 8px;
  text-align: left;
  font-weight: 500;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.preview-wrap td {
  padding: 5px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.preview-wrap tr:last-child td { border-bottom: none; }

.log-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-top: 1rem;
  font-size: 12px;
  line-height: 2;
  color: var(--text2);
}

.log-line.ok { color: var(--success); font-weight: 500; }
.log-line.warn { color: var(--warn); font-weight: 500; }
.log-line.sep { color: var(--border2); }

footer {
  margin-top: 3rem;
  text-align: center;
  font-size: 12px;
  color: var(--text3);
}
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="app-label"><a href="../" style="color:inherit;text-decoration:none;">← ツールポータルに戻る</a></div>
    <h1>マイナビ重複判定ツール</h1>
    <p class="subtitle">マイナビ新規リストをDF・MD・DF_MDと照合し、完全新規と移動対象に振り分けます</p>
  </header>

  <div class="card">
    <div class="card-title">CSVファイルをアップロード</div>
    <div class="upload-grid">

      <div class="upload-item" id="box-mynavi">
        <label>
          <div class="upload-icon">📋</div>
          <div class="upload-meta">
            <div class="upload-name">マイナビ新規リスト <span class="upload-required">必須</span></div>
            <div class="upload-status" id="status-mynavi">クリックして選択</div>
          </div>
          <input type="file" accept=".csv" onchange="handleFile('mynavi', this)">
        </label>
      </div>

      <div class="upload-item" id="box-df">
        <label>
          <div class="upload-icon">📄</div>
          <div class="upload-meta">
            <div class="upload-name">DFのみ</div>
            <div class="upload-status" id="status-df">クリックして選択（任意）</div>
          </div>
          <input type="file" accept=".csv" onchange="handleFile('df', this)">
        </label>
      </div>

      <div class="upload-item" id="box-md">
        <label>
          <div class="upload-icon">📄</div>
          <div class="upload-meta">
            <div class="upload-name">MDのみ</div>
            <div class="upload-status" id="status-md">クリックして選択（任意）</div>
          </div>
          <input type="file" accept=".csv" onchange="handleFile('md', this)">
        </label>
      </div>

      <div class="upload-item" id="box-dfmd">
        <label>
          <div class="upload-icon">📄</div>
          <div class="upload-meta">
            <div class="upload-name">DF_MD（DFかつMD）</div>
            <div class="upload-status" id="status-dfmd">クリックして選択（任意）</div>
          </div>
          <input type="file" accept=".csv" onchange="handleFile('dfmd', this)">
        </label>
      </div>

    </div>
  </div>

  <button class="run-btn" id="run-btn" onclick="runProcess()" disabled>
    重複判定を実行
  </button>

  <div class="result-section" id="result-section">

    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">マイナビ新規（入力）</div>
        <div class="stat-value" id="stat-input">—</div>
      </div>
      <div class="stat success">
        <div class="stat-label">完全新規（インポート対象）</div>
        <div class="stat-value" id="stat-new">—</div>
      </div>
      <div class="stat warn">
        <div class="stat-label">重複あり（移動対象）</div>
        <div class="stat-value" id="stat-dup">—</div>
      </div>
    </div>

    <div class="result-grid">

      <div class="result-card success">
        <div class="result-card-label">
          <span class="badge success">出力①</span>
        </div>
        <div class="result-card-title">マイナビのみ用インポートCSV</div>
        <div class="result-card-desc">重複なし。comdeskの「マイナビのみ」プロジェクトにインポートしてください。</div>
        <button class="dl-btn success" id="dl-new" onclick="downloadCSV('new')" disabled>
          ⬇ ダウンロード（mynavi_import.csv）
        </button>
        <div class="preview-wrap" id="preview-new"></div>
      </div>

      <div class="result-card warn">
        <div class="result-card-label">
          <span class="badge warn">出力②</span>
        </div>
        <div class="result-card-title">移動対象リスト（MD_マイナビ用）</div>
        <div class="result-card-desc">MDのみ等と重複。追加→削除の手順でMD_マイナビプロジェクトへ移動してください。</div>
        <button class="dl-btn warn" id="dl-dup" onclick="downloadCSV('dup')" disabled>
          ⬇ ダウンロード（mynavi_move.csv）
        </button>
        <div class="preview-wrap" id="preview-dup"></div>
      </div>

    </div>

    <div class="log-card" id="log-box"></div>

  </div>

  <footer>Crestix Inc. — 第一営業部 社内限定ツール ｜ <a href="../" style="color:inherit">ポータルに戻る</a></footer>

</div>

<script>
const files = { mynavi: null, df: null, md: null, dfmd: null };
const parsed = { mynavi: [], df: [], md: [], dfmd: [] };
let resultNew = [], resultDup = [];

function handleFile(key, input) {
  const file = input.files[0];
  if (!file) return;
  files[key] = file;
  document.getElementById('status-' + key).textContent = '読み込み中...';

  // 先頭3バイトでUTF-8 BOM（EF BB BF）を確認
  const sniffer = new FileReader();
  sniffer.onload = (e) => {
    const bytes = new Uint8Array(e.target.result);
    const hasUtf8Bom = bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF;
    const encoding = hasUtf8Bom ? 'UTF-8' : 'Shift-JIS';
    parseWithEncoding(file, key, encoding);
  };
  sniffer.readAsArrayBuffer(file.slice(0, 3));
}

function parseWithEncoding(file, key, encoding) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const res = Papa.parse(text, { header: true, skipEmptyLines: true });
    // 文字化けチェック：ヘッダーに置換文字（U+FFFD）が含まれる場合はUTF-8で再試行
    const firstHeader = Object.keys(res.data[0] || {})[0] || '';
    if (encoding === 'Shift-JIS' && firstHeader.includes('�')) {
      parseWithEncoding(file, key, 'UTF-8');
      return;
    }
    parsed[key] = res.data;
    onParsed(key, file.name, res.data.length);
  };
  reader.onerror = () => { document.getElementById('status-' + key).textContent = '読み込みエラー'; };
  reader.readAsText(file, encoding);
}

function onParsed(key, filename, count) {
  document.getElementById('status-' + key).textContent = filename + ' (' + count + '件)';
  document.getElementById('box-' + key).classList.add('loaded');
  updateRunBtn();
}

function updateRunBtn() {
  document.getElementById('run-btn').disabled = !files.mynavi;
}

/* ---- 重複判定ロジック（GASと同等） ---- */

function zenkakuToHankaku(s) {
  return String(s || '').replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/　/g, ' ');
}

function buildPhoneKey(phone) {
  const digits = zenkakuToHankaku(String(phone || '')).replace(/\D/g, '');
  if (!digits) return '';
  return digits.replace(/^0+/, '');
}

function buildAddressKey(pref, addr1, addr2) {
  return [pref, addr1, addr2]
    .map(v => zenkakuToHankaku(String(v || '')).replace(/[\s\u3000]/g, '').toLowerCase())
    .join('');
}

function val(obj, ...keys) {
  for (const k of keys) {
    const v = obj && obj[k] !== undefined ? String(obj[k]).trim() : '';
    if (v) return v;
  }
  return '';
}

function normalizeRow(src) {
  return {
    UUID:  val(src, 'UUID'),
    名前:  val(src, '名前', '医院名'),
    Tel1:  val(src, 'Tel1', '電話番号'),
    都道府県: val(src, '都道府県'),
    住所１: val(src, '住所１', '住所'),
    住所２: val(src, '住所２'),
    記事名: val(src, '記事名', '記事タイトル'),
    _raw: src
  };
}

function buildIndex(rows) {
  const phoneMap = new Map(), addrMap = new Map();
  rows.forEach(r => {
    const pk = buildPhoneKey(r.Tel1);
    const ak = buildAddressKey(r.都道府県, r.住所１, r.住所２);
    if (pk) phoneMap.set(pk, r);
    if (ak) addrMap.set(ak, r);
  });
  return { phoneMap, addrMap };
}

function isDuplicate(row, index) {
  const pk = buildPhoneKey(row.Tel1);
  if (pk && index.phoneMap.has(pk)) return true;
  if (!pk) {
    const ak = buildAddressKey(row.都道府県, row.住所１, row.住所２);
    if (ak && index.addrMap.has(ak)) return true;
  }
  return false;
}

function runProcess() {
  const btn = document.getElementById('run-btn');
  btn.textContent = '処理中...';
  btn.disabled = true;

  setTimeout(() => {
    try {
      _run();
    } catch (e) {
      alert('エラーが発生しました: ' + e.message);
    }
    btn.textContent = '重複判定を実行';
    btn.disabled = false;
  }, 50);
}

function _run() {
  const logs = [];
  const mynaviRows = parsed.mynavi.map(normalizeRow);
  const dfRows     = parsed.df.map(normalizeRow);
  const mdRows     = parsed.md.map(normalizeRow);
  const dfmdRows   = parsed.dfmd.map(normalizeRow);

  const dfIdx   = buildIndex(dfRows);
  const mdIdx   = buildIndex(mdRows);
  const dfmdIdx = buildIndex(dfmdRows);

  logs.push('マイナビ新規: ' + mynaviRows.length + '件');
  if (dfRows.length)   logs.push('DFのみ: '   + dfRows.length + '件');
  if (mdRows.length)   logs.push('MDのみ: '   + mdRows.length + '件');
  if (dfmdRows.length) logs.push('DF_MD: '    + dfmdRows.length + '件');
  logs.push('---');

  resultNew = []; resultDup = [];
  let dupDf = 0, dupMd = 0, dupDfmd = 0;

  mynaviRows.forEach(r => {
    const inDf   = dfRows.length   ? isDuplicate(r, dfIdx)   : false;
    const inMd   = mdRows.length   ? isDuplicate(r, mdIdx)   : false;
    const inDfmd = dfmdRows.length ? isDuplicate(r, dfmdIdx) : false;

    if (inDf || inMd || inDfmd) {
      const reasons = [];
      if (inDf)   { reasons.push('DFのみ');   dupDf++;   }
      if (inMd)   { reasons.push('MDのみ');   dupMd++;   }
      if (inDfmd) { reasons.push('DF_MD'); dupDfmd++; }
      resultDup.push({ ...r._raw, _重複先: reasons.join('/') });
    } else {
      resultNew.push(r._raw);
    }
  });

  logs.push('✅ 完全新規: ' + resultNew.length + '件 → マイナビのみにインポート');
  logs.push('⚠ 重複あり: ' + resultDup.length + '件（DF重複:' + dupDf + ' / MD重複:' + dupMd + ' / DF_MD重複:' + dupDfmd + '）');

  document.getElementById('stat-input').textContent = mynaviRows.length;
  document.getElementById('stat-new').textContent   = resultNew.length;
  document.getElementById('stat-dup').textContent   = resultDup.length;

  document.getElementById('dl-new').disabled = resultNew.length === 0;
  document.getElementById('dl-dup').disabled = resultDup.length === 0;

  renderLog(logs);
  renderPreview('preview-new', resultNew, 5);
  renderPreview('preview-dup', resultDup, 5);

  document.getElementById('result-section').classList.add('visible');
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderLog(lines) {
  document.getElementById('log-box').innerHTML = lines.map(l => {
    const cls = l.startsWith('✅') ? 'ok' : l.startsWith('⚠') ? 'warn' : l === '---' ? 'sep' : '';
    return '<div class="log-line ' + cls + '">' + l + '</div>';
  }).join('');
}

function renderPreview(id, rows, limit) {
  const wrap = document.getElementById(id);
  if (!rows.length) {
    wrap.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:#9b9a94">0件</div>';
    return;
  }
  const cols = Object.keys(rows[0]).filter(k => k !== '_raw').slice(0, 7);
  const sample = rows.slice(0, limit);
  let html = '<table><thead><tr>' + cols.map(c => '<th style="width:' + Math.floor(100/cols.length) + '%">' + c + '</th>').join('') + '</tr></thead><tbody>';
  sample.forEach(r => {
    html += '<tr>' + cols.map(c => '<td title="' + esc(r[c]) + '">' + esc(r[c]) + '</td>').join('') + '</tr>';
  });
  if (rows.length > limit) {
    html += '<tr><td colspan="' + cols.length + '" style="padding:6px 8px;color:#9b9a94;font-style:italic">…他' + (rows.length - limit) + '件</td></tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function esc(v) {
  return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function downloadCSV(type) {
  const rows = type === 'new' ? resultNew : resultDup;
  if (!rows.length) return;
  const csv = Papa.unparse(rows, { header: true });
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = type === 'new' ? 'mynavi_import.csv' : 'mynavi_move.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
