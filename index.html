<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一営業部 ツールポータル | Crestix</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e0dfd8;
  --border2: #c8c7bf;
  --text: #1a1918;
  --text2: #6b6a65;
  --text3: #9b9a94;
  --accent: #1a5276;
  --accent-bg: #eaf0f6;
  --accent-light: #d0e4f0;
  --radius: 8px;
  --radius-lg: 14px;
}

body {
  font-family: 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

.page {
  max-width: 800px;
  margin: 0 auto;
  padding: 3rem 1.5rem 5rem;
}

/* Header */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.03em;
  flex-shrink: 0;
}

.logo-text {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.01em;
}

.logo-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 1px;
}

.header-badge {
  font-size: 11px;
  font-weight: 500;
  background: var(--accent-bg);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--accent-light);
}

/* Hero */
.hero {
  margin-bottom: 2.5rem;
}

.hero-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

.hero-title {
  font-size: 28px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.3;
  margin-bottom: 10px;
}

.hero-desc {
  font-size: 14px;
  color: var(--text2);
  max-width: 520px;
  line-height: 1.7;
}

/* Section */
.section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Tool cards */
.tools-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 2rem;
}

@media (max-width: 540px) {
  .tools-grid { grid-template-columns: 1fr; }
  .hero-title { font-size: 22px; }
}

.tool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.15s, box-shadow 0.15s;
  position: relative;
}

.tool-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 12px rgba(26,82,118,0.08);
}

.tool-card.coming-soon {
  opacity: 0.5;
  pointer-events: none;
}

.tool-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.tool-icon {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: var(--accent-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.tool-status {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 99px;
}

.tool-status.active {
  background: #eaf6ef;
  color: #1a6b3c;
  border: 1px solid #b7dfc8;
}

.tool-status.soon {
  background: var(--surface2);
  color: var(--text3);
  border: 1px solid var(--border);
}

.tool-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}

.tool-desc {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.55;
}

.tool-arrow {
  position: absolute;
  bottom: 1.25rem;
  right: 1.25rem;
  font-size: 14px;
  color: var(--text3);
  transition: color 0.15s, transform 0.15s;
}

.tool-card:hover .tool-arrow {
  color: var(--accent);
  transform: translateX(2px);
}

/* Footer */
footer {
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-text { font-size: 12px; color: var(--text3); }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div class="logo">
      <div class="logo-mark">Cr</div>
      <div>
        <div class="logo-text">Crestix Inc.</div>
        <div class="logo-sub">第一営業部</div>
      </div>
    </div>
    <span class="header-badge">社内限定</span>
  </header>

  <section class="hero">
    <div class="hero-eyebrow">Tool Portal</div>
    <h1 class="hero-title">第一営業部<br>業務ツールポータル</h1>
    <p class="hero-desc">医療クリニック向け営業業務に使用する社内ツールをまとめています。各ツールはCSVをアップロードするだけで使えます。</p>
  </section>

  <div class="section-label">利用可能なツール</div>
  <div class="tools-grid">

    <a href="./dedup/" class="tool-card">
      <div class="tool-card-header">
        <div class="tool-icon">🔍</div>
        <span class="tool-status active">利用可能</span>
      </div>
      <div>
        <div class="tool-name">マイナビ重複判定</div>
        <div class="tool-desc">マイナビ新規リストをDF・MD・DF_MDと照合し、完全新規と移動対象に振り分けます。</div>
      </div>
      <span class="tool-arrow">→</span>
    </a>

    <a href="./integrate/" class="tool-card">
      <div class="tool-card-header">
        <div class="tool-icon">📊</div>
        <span class="tool-status active">利用可能</span>
      </div>
      <div>
        <div class="tool-name">3媒体統合ツール</div>
        <div class="tool-desc">DF・MD・マイナビの課金リストを統合し、重複判定・媒体別分類（7パターン）を行います。</div>
      </div>
      <span class="tool-arrow">→</span>
    </a>

  </div>

  <footer>
    <span class="footer-text">Crestix Inc. — 第一営業部 社内限定ツール</span>
    <span class="footer-text" id="updated"></span>
  </footer>

</div>
<script>
  document.getElementById('updated').textContent =
    '最終更新: ' + new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
</script>
</body>
</html>
